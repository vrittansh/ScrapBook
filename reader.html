<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ article.title }}</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="topbar">
        <a href="{{ url_for('dashboard') }}" class="back-link">Back to Dashboard</a>
        <button id="theme-toggle" class="icon-btn" onclick="toggleTheme()" title="Toggle Theme">Toggle Theme</button>
    </div>
    <article class="reader">
        {% if article.image %}
        <img src="{{article.image }}" alt="" class="hero-image" onerror="this.style.display='none'">
        {% endif %}
        <h1>{{ article.title }}</h1>
        <p class="source-link">
            <a href="{{ article.url }}" target="_blank" rel="noopener">View Original Article</a>
            &middot; Saved {{ article.saved_at }}
        </p>
        {% for paragraph in article.paragraphs %}
        <p>{{ paragraph }}</p>
        {% endfor %}
    </article>
<script>
    function toggleTheme() {
        document.body.classList.toggle('dark');
        localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    }
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
    }
</script>
</body>
</html>
