{% extends "base.html" %}
{% block title %}{{ article.title }}{% endblock %}

{% block content %}
<article class="reader">
    <h1>{{ article.title }}</h1>
    <p class="source-link"><a href="{{ article.url }}" target="_blank">View original ↗</a></p>

    {% if article.image %}
    <img class="reader-image" src="{{ article.image }}" alt="">
    {% endif %}

    <div class="reader-body">
    {% for paragraph in article.text.split('\n\n') %}
        <p>{{ paragraph }}</p>
    {% endfor %}
    </div>
</article>
{% endblock %}
