<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScrabBook</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="topbar">
    <h1>ScrabBook</h1>
    <button id="theme-toggle" class="icon-btn" onclick="toggleTheme()" title="Toggle Theme">Toggle Theme</button>
</div>
<main class="dashboard">
<form action="{{ url_for('save') }}" method="POST" class="url-form">
    <input type="text" name="url" placeholder="Paste an article URL, e.g. https://example.com/some-post" required>
    <button type="submit">Save Article</button>
</form>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="flash">
    {% for message in messages %}
    <p>{{ message }}</p>
    {% endfor %}
    </div>
    {% endif %}
    {% endwith %}
    {% if articles %}
    <div class="article-grid">
    {% for article in articles %}
    <div class="card">
    {% if article.image %}
    <img src="{{ article.image }}" alt="" class="card-image" onerror="this.style.display='none'">
    
</body>
</html>
